<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevSecOps Roadmap Tracker</title>
  <!-- Supabase JS client -->

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #273549;
      --border: #334155;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #6366f1;
      --green: #10b981;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── SETUP MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
      padding: 20px;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      max-width: 520px;
      width: 100%;
    }
    .modal h2 { font-size: 1.3rem; margin-bottom: 8px; }
    .modal p  { color: var(--muted); font-size: 0.88rem; line-height: 1.6; margin-bottom: 20px; }
    .modal .steps {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 18px;
      margin-bottom: 20px;
      font-size: 0.83rem;
      line-height: 1.9;
      color: var(--muted);
    }
    .modal .steps b { color: var(--text); }
    .modal .steps code {
      background: var(--surface2);
      padding: 1px 6px;
      border-radius: 4px;
      font-family: 'Menlo', monospace;
      font-size: 0.8rem;
      color: #a5f3fc;
    }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 0.82rem; color: var(--muted); margin-bottom: 6px; }
    .form-group input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 14px;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: var(--accent); }
    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.5; cursor: default; }
    .modal-error { color: #f87171; font-size: 0.82rem; margin-top: 10px; }

    /* ── HEADER ── */
    .header {
      background: linear-gradient(135deg, #1e3a8a 0%, #4c1d95 100%);
      padding: 24px 32px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 16px;
    }
    .header-title h1 { font-size: 1.5rem; font-weight: 700; }
    .header-title p  { color: #c4b5fd; font-size: 0.85rem; margin-top: 3px; }

    /* Auth bar */
    .auth-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .auth-email {
      font-size: 0.8rem;
      color: #c4b5fd;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .sync-status {
      font-size: 0.75rem;
      color: var(--green);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .sync-status.visible { opacity: 1; }
    .btn-sm {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 6px 12px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.78rem;
      white-space: nowrap;
      transition: background 0.2s;
    }
    .btn-sm:hover { background: rgba(255,255,255,0.22); }

    /* Magic link form (inline) */
    .auth-form { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .auth-form input {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 7px;
      color: #fff;
      padding: 6px 12px;
      font-size: 0.82rem;
      outline: none;
      width: 220px;
    }
    .auth-form input::placeholder { color: rgba(255,255,255,0.45); }
    .auth-msg { font-size: 0.8rem; color: #86efac; }
    .auth-err { font-size: 0.8rem; color: #fca5a5; }

    /* Overall bar */
    .overall-bar-wrap { display: flex; align-items: center; gap: 12px; }
    .overall-bar-wrap > span { font-size: 0.82rem; color: #c4b5fd; white-space: nowrap; }
    .bar-track {
      flex: 1;
      height: 8px;
      background: rgba(255,255,255,0.15);
      border-radius: 99px;
      overflow: hidden;
      min-width: 80px;
    }
    .bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #6366f1, #10b981);
      transition: width 0.4s ease;
    }
    .overall-pct { font-size: 0.95rem; font-weight: 700; white-space: nowrap; }

    /* ── LAYOUT ── */
    .layout { display: flex; flex: 1; min-height: 0; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 14px 0;
      overflow-y: auto;
    }
    .sidebar-label {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0 16px;
      margin-bottom: 8px;
    }
    .phase-tab {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.15s, border-color 0.15s;
      user-select: none;
    }
    .phase-tab:hover { background: var(--surface2); }
    .phase-tab.active { background: var(--surface2); }
    .phase-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .phase-tab-text { flex: 1; font-size: 0.8rem; line-height: 1.3; }
    .phase-tab-pct { font-size: 0.73rem; color: var(--muted); }

    /* ── MAIN ── */
    .main { flex: 1; overflow-y: auto; padding: 28px 32px; }
    .phase-panel { display: none; }
    .phase-panel.active { display: block; }

    .phase-header {
      display: flex; align-items: flex-start; gap: 14px;
      margin-bottom: 22px; padding-bottom: 18px;
      border-bottom: 1px solid var(--border);
    }
    .phase-icon { font-size: 2rem; }
    .phase-header-info { flex: 1; }
    .phase-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 3px; }
    .phase-meta  { color: var(--muted); font-size: 0.83rem; }
    .phase-badge {
      padding: 5px 12px; border-radius: 99px;
      font-size: 0.78rem; font-weight: 700;
      background: rgba(16,185,129,0.15); color: var(--green);
      border: 1px solid rgba(16,185,129,0.3);
      white-space: nowrap; display: none;
    }
    .phase-badge.show { display: inline-block; }

    .phase-progress {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 18px;
      margin-bottom: 20px; display: flex; align-items: center; gap: 16px;
    }
    .phase-progress-info { flex: 1; }
    .phase-progress-info .pct-label { font-size: 0.82rem; color: var(--muted); margin-bottom: 6px; }
    .phase-pct-num { font-size: 1.5rem; font-weight: 700; }
    .phase-bar-track { flex: 3; height: 7px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .phase-bar-fill  { height: 100%; border-radius: 99px; transition: width 0.4s ease; }

    /* ── WEEK ── */
    .week-section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); margin-bottom: 12px; overflow: hidden;
    }
    .week-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 16px; cursor: pointer; user-select: none;
      transition: background 0.15s;
    }
    .week-header:hover { background: var(--surface2); }
    .week-header-left { display: flex; align-items: center; gap: 9px; }
    .week-label { font-weight: 600; font-size: 0.9rem; }
    .week-tasks-count { font-size: 0.76rem; color: var(--muted); }
    .week-mini-bar { width: 70px; height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .week-mini-fill { height: 100%; border-radius: 99px; transition: width 0.3s; }
    .week-chevron { color: var(--muted); font-size: 0.8rem; transition: transform 0.2s; }
    .week-section.open .week-chevron { transform: rotate(180deg); }
    .week-body { display: none; padding: 2px 16px 12px; }
    .week-section.open .week-body { display: block; }

    /* ── TASK ── */
    .task-item {
      display: flex; align-items: flex-start; gap: 9px;
      padding: 7px 5px; border-radius: 6px;
      transition: background 0.12s; cursor: pointer;
    }
    .task-item:hover { background: var(--surface2); }
    .task-item input[type="checkbox"] {
      width: 15px; height: 15px; margin-top: 3px;
      flex-shrink: 0; accent-color: var(--accent); cursor: pointer;
    }
    .task-label { font-size: 0.86rem; line-height: 1.5; color: var(--text); cursor: pointer; }
    .task-item.done .task-label { text-decoration: line-through; color: var(--muted); }

    /* cert card */
    .cert-card {
      background: linear-gradient(135deg, var(--surface2), var(--surface));
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 12px 16px; margin-top: 18px;
      display: flex; align-items: center; gap: 12px;
    }
    .cert-card .cert-icon { font-size: 1.5rem; }
    .cert-card .cert-info { font-size: 0.83rem; }
    .cert-card .cert-name { font-weight: 600; margin-bottom: 2px; }
    .cert-card .cert-meta { color: var(--muted); }

    @media (max-width: 700px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); padding: 8px 0; }
      .main { padding: 18px 14px; }
      .auth-form input { width: 160px; }
    }
  </style>
</head>
<body>

//  SUPABASE CONFIG  (injected by GitHub Actions)

const SUPABASE_URL      = '__SUPABASE_URL__';
const SUPABASE_ANON_KEY = '__SUPABASE_ANON_KEY__';

const STORAGE_KEY = 'devsecops-tracker-v1';

let sb = null;           // Supabase client
let currentUser = null;  // logged-in user
let syncTimer   = null;

function initSupabase(url, key) {
  sb = window.supabase.createClient(url, key);

  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') {
      currentUser = session.user;
      await pullProgress();
      renderAuthBar();
      init();
    } else if (event === 'SIGNED_OUT') {
      currentUser = null;
      renderAuthBar();
    }
  });

  // Restore session on page load
  sb.auth.getSession().then(({ data: { session } }) => {
    if (session) {
      currentUser = session.user;
      pullProgress().then(() => { renderAuthBar(); init(); });
    } else {
      renderAuthBar();
    }
  });
}

// Pull progress from Supabase → overwrite local state
async function pullProgress() {
  if (!sb || !currentUser) return;
  const { data, error } = await sb
    .from('progress')
    .select('data')
    .eq('user_id', currentUser.id)
    .maybeSingle();
  if (error) { console.error('pull error', error); return; }
  if (data?.data) {
    state = data.data;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }
}

// Push progress to Supabase (debounced 1 s)
function pushProgress() {
  if (!sb || !currentUser) return;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(async () => {
    const { error } = await sb.from('progress').upsert({
      user_id: currentUser.id,
      data: state,
      updated_at: new Date().toISOString()
    });
    if (!error) flashSync();
  }, 1000);
}

function flashSync() {
  const el = document.getElementById('sync-status');
  if (!el) return;
  el.classList.add('visible');
  setTimeout(() => el.classList.remove('visible'), 2500);
}

// ═══════════════════════════════════════════
//  AUTH UI
// ═══════════════════════════════════════════
function renderAuthBar() {
  const bar = document.getElementById('auth-bar');
  if (!bar) return;

  if (!sb) {
    bar.innerHTML = `<span class="auth-email" style="color:#fca5a5">⚠ Supabase not configured</span>`;
    return;
  }

  if (currentUser) {
    bar.innerHTML = `
      <span class="auth-email">📧 ${currentUser.email}</span>
      <button class="btn-sm" onclick="doSignOut()">Sign out</button>
    `;
  } else {
    bar.innerHTML = `
      <div class="auth-form">
        <input id="auth-email-input" type="email" placeholder="your@email.com" />
        <button class="btn-sm" onclick="doSignIn()">Send magic link</button>
      </div>
      <span class="auth-msg hidden" id="auth-msg"></span>
      <span class="auth-err hidden" id="auth-err"></span>
    `;
    document.getElementById('auth-email-input')
      .addEventListener('keydown', e => { if (e.key === 'Enter') doSignIn(); });
  }
}

async function doSignIn() {
  const input = document.getElementById('auth-email-input');
  const msg   = document.getElementById('auth-msg');
  const err   = document.getElementById('auth-err');
  if (!input) return;
  const email = input.value.trim();
  if (!email) return;

  try {
    const { error } = await sb.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.href }
    });
    if (error) throw error;
    msg.textContent = '✉ Magic link sent! Check your email.';
    msg.classList.remove('hidden');
    if (err) err.classList.add('hidden');
  } catch (e) {
    if (err) { err.textContent = e.message; err.classList.remove('hidden'); }
  }
}

async function doSignOut() {
  if (sb) await sb.auth.signOut();
}


// ═══════════════════════════════════════════
//  LOCAL STATE
// ═══════════════════════════════════════════
let state = {};
try { state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch {}

function saveLocal() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function taskKey(pi, wi, ti) { return `p${pi+1}-w${wi}-t${ti}`; }

// ═══════════════════════════════════════════
//  STATS
// ═══════════════════════════════════════════
function phaseStats(pi) {
  let total = 0, done = 0;
  PHASES[pi].weeks.forEach((w, wi) => {
    w.tasks.forEach((_, ti) => { total++; if (state[taskKey(pi, wi, ti)]) done++; });
  });
  return { total, done, pct: total ? Math.round(done / total * 100) : 0 };
}

function overallStats() {
  let total = 0, done = 0;
  PHASES.forEach((_, pi) => { const s = phaseStats(pi); total += s.total; done += s.done; });
  return { total, done, pct: total ? Math.round(done / total * 100) : 0 };
}

// ═══════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════
let activePhase = 0;

function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  const label   = sidebar.querySelector('.sidebar-label');
  sidebar.innerHTML = '';
  sidebar.appendChild(label);
  PHASES.forEach((ph, pi) => {
    const s   = phaseStats(pi);
    const tab = document.createElement('div');
    tab.className = 'phase-tab' + (pi === activePhase ? ' active' : '');
    tab.style.borderLeftColor = pi === activePhase ? ph.color : 'transparent';
    tab.innerHTML = `
      <span class="phase-dot" style="background:${ph.color}"></span>
      <span class="phase-tab-text">${ph.icon} ${ph.title.replace(`Phase ${pi+1}: `, '')}</span>
      <span class="phase-tab-pct">${s.pct}%</span>`;
    tab.onclick = () => switchPhase(pi);
    sidebar.appendChild(tab);
  });
}

function buildMain() {
  const main = document.getElementById('main-content');
  main.innerHTML = '';
  PHASES.forEach((ph, pi) => {
    const s = phaseStats(pi);
    const panel = document.createElement('div');
    panel.className = 'phase-panel' + (pi === activePhase ? ' active' : '');
    panel.id = 'panel-' + pi;
    panel.innerHTML = `
      <div class="phase-header">
        <div class="phase-icon">${ph.icon}</div>
        <div class="phase-header-info">
          <div class="phase-title">${ph.title}</div>
          <div class="phase-meta">${ph.meta}</div>
        </div>
        <span class="phase-badge${s.pct === 100 ? ' show' : ''}">✅ COMPLETE</span>
      </div>
      <div class="phase-progress">
        <div class="phase-progress-info">
          <div class="pct-label">Phase Progress</div>
          <div class="phase-pct-num" id="pct-num-${pi}">${s.pct}%</div>
        </div>
        <div class="phase-bar-track">
          <div class="phase-bar-fill" id="phase-fill-${pi}" style="width:${s.pct}%;background:${ph.color}"></div>
        </div>
      </div>
      ${ph.weeks.map((w, wi) => buildWeek(ph, pi, w, wi)).join('')}
      <div class="cert-card">
        <div class="cert-icon">${ph.cert.icon}</div>
        <div class="cert-info">
          <div class="cert-name">${ph.cert.name}</div>
          <div class="cert-meta">${ph.cert.meta}</div>
        </div>
      </div>`;
    main.appendChild(panel);
  });

  document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
    cb.addEventListener('change', onCheck);
  });

  const firstWeek = document.querySelector('#panel-' + activePhase + ' .week-section');
  if (firstWeek) firstWeek.classList.add('open');
}

function buildWeek(ph, pi, w, wi) {
  const total = w.tasks.length;
  const done  = w.tasks.filter((_, ti) => state[taskKey(pi, wi, ti)]).length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  const tasks = w.tasks.map((task, ti) => {
    const key = taskKey(pi, wi, ti);
    return `
      <div class="task-item ${state[key] ? 'done' : ''}" id="task-${key}">
        <input type="checkbox" id="cb-${key}" data-key="${key}" ${state[key] ? 'checked' : ''} />
        <label class="task-label" for="cb-${key}">${task}</label>
      </div>`;
  }).join('');
  return `
    <div class="week-section" id="week-${pi}-${wi}">
      <div class="week-header" onclick="toggleWeek(this)">
        <div class="week-header-left">
          <span class="week-label">${w.label}</span>
          <span class="week-tasks-count">${done}/${total} tasks</span>
        </div>
        <div style="display:flex;align-items:center;gap:9px">
          <div class="week-mini-bar">
            <div class="week-mini-fill" style="width:${pct}%;background:${ph.color}"></div>
          </div>
          <span class="week-chevron">▼</span>
        </div>
      </div>
      <div class="week-body">${tasks}</div>
    </div>`;
}

function toggleWeek(header) { header.closest('.week-section').classList.toggle('open'); }

function onCheck(e) {
  const key = e.target.dataset.key;
  state[key] = e.target.checked;
  saveLocal();
  pushProgress();  // sync to Supabase (debounced)

  document.getElementById('task-' + key)?.classList.toggle('done', e.target.checked);

  const parts = key.split('-');
  const pi = parseInt(parts[0].slice(1)) - 1;
  const wi = parseInt(parts[1].slice(1));
  const w  = PHASES[pi].weeks[wi];
  const total = w.tasks.length;
  const done  = w.tasks.filter((_, ti) => state[taskKey(pi, wi, ti)]).length;
  const pct   = total ? Math.round(done / total * 100) : 0;

  const weekEl = document.getElementById(`week-${pi}-${wi}`);
  if (weekEl) {
    weekEl.querySelector('.week-tasks-count').textContent = `${done}/${total} tasks`;
    weekEl.querySelector('.week-mini-fill').style.width = pct + '%';
  }

  updatePhaseProgress(pi);
  updateOverall();
}

function updatePhaseProgress(pi) {
  const s = phaseStats(pi);
  document.getElementById('phase-fill-' + pi) ?.style && (document.getElementById('phase-fill-' + pi).style.width = s.pct + '%');
  const numEl = document.getElementById('pct-num-' + pi);
  if (numEl) numEl.textContent = s.pct + '%';
  document.getElementById('panel-' + pi)?.querySelector('.phase-badge')?.classList.toggle('show', s.pct === 100);
  buildSidebar();
}

function updateOverall() {
  const s = overallStats();
  document.getElementById('overall-fill').style.width = s.pct + '%';
  document.getElementById('overall-pct').textContent  = s.pct + '%';
}

function switchPhase(pi) {
  activePhase = pi;
  document.querySelectorAll('.phase-tab').forEach((t, i) => {
    t.classList.toggle('active', i === pi);
    t.style.borderLeftColor = i === pi ? PHASES[i].color : 'transparent';
  });
  document.querySelectorAll('.phase-panel').forEach((p, i) => p.classList.toggle('active', i === pi));
  const fw = document.querySelector('#panel-' + pi + ' .week-section');
  if (fw && !fw.classList.contains('open')) fw.classList.add('open');
}

function resetAll() {
  if (!confirm('Reset ALL progress? This cannot be undone.')) return;
  state = {};
  saveLocal();
  pushProgress();
  init();
}

function init() {
  buildSidebar();
  buildMain();
  updateOverall();
}

// ═══════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════
if (SUPABASE_URL && !SUPABASE_URL.startsWith('__')) {
  initSupabase(SUPABASE_URL, SUPABASE_ANON_KEY);
} else {
  renderAuthBar();
}

init();
</script>
</body>
</html>

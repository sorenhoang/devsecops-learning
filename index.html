<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevSecOps Roadmap Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --p1: #3b82f6;
      --p2: #8b5cf6;
      --p3: #ec4899;
      --p4: #f59e0b;
      --p5: #10b981;
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #273549;
      --border: #334155;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    .header {
      background: linear-gradient(135deg, #1e3a8a 0%, #4c1d95 100%);
      padding: 28px 32px;
      border-bottom: 1px solid var(--border);
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 20px;
    }
    .header h1 { font-size: 1.6rem; font-weight: 700; }
    .header p  { color: #c4b5fd; font-size: 0.9rem; margin-top: 4px; }
    .btn-reset {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s;
    }
    .btn-reset:hover { background: rgba(255,255,255,0.2); }

    .overall-bar-wrap { display: flex; align-items: center; gap: 14px; }
    .overall-bar-wrap span { font-size: 0.85rem; color: #c4b5fd; white-space: nowrap; }
    .bar-track {
      flex: 1;
      height: 10px;
      background: rgba(255,255,255,0.15);
      border-radius: 99px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #6366f1, #10b981);
      transition: width 0.4s ease;
    }
    .overall-pct { font-size: 1rem; font-weight: 700; white-space: nowrap; }

    /* ── LAYOUT ── */
    .layout { display: flex; flex: 1; overflow: hidden; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 16px 0;
      overflow-y: auto;
    }
    .sidebar-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0 16px;
      margin-bottom: 8px;
    }
    .phase-tab {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.15s, border-color 0.15s;
      user-select: none;
    }
    .phase-tab:hover { background: var(--surface2); }
    .phase-tab.active { background: var(--surface2); }
    .phase-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .phase-tab-text { flex: 1; font-size: 0.82rem; line-height: 1.3; }
    .phase-tab-pct { font-size: 0.75rem; color: var(--muted); }

    /* ── MAIN ── */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px;
    }

    .phase-panel { display: none; }
    .phase-panel.active { display: block; }

    .phase-header {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .phase-icon { font-size: 2.2rem; }
    .phase-header-info { flex: 1; }
    .phase-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; }
    .phase-meta { color: var(--muted); font-size: 0.85rem; }
    .phase-badge {
      padding: 6px 14px;
      border-radius: 99px;
      font-size: 0.8rem;
      font-weight: 700;
      background: rgba(16,185,129,0.15);
      color: #10b981;
      border: 1px solid rgba(16,185,129,0.3);
      white-space: nowrap;
      display: none;
    }
    .phase-badge.show { display: inline-block; }

    /* phase progress */
    .phase-progress {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .phase-progress-info { flex: 1; }
    .phase-progress-info .pct-label { font-size: 0.85rem; color: var(--muted); margin-bottom: 8px; }
    .phase-pct-num { font-size: 1.6rem; font-weight: 700; }
    .phase-bar-track {
      flex: 3;
      height: 8px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .phase-bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    /* ── WEEK SECTION ── */
    .week-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 16px;
      overflow: hidden;
    }
    .week-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .week-header:hover { background: var(--surface2); }
    .week-header-left { display: flex; align-items: center; gap: 10px; }
    .week-label { font-weight: 600; font-size: 0.95rem; }
    .week-tasks-count { font-size: 0.78rem; color: var(--muted); }
    .week-mini-bar {
      width: 80px;
      height: 5px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .week-mini-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.3s;
    }
    .week-chevron { color: var(--muted); font-size: 0.85rem; transition: transform 0.2s; }
    .week-section.open .week-chevron { transform: rotate(180deg); }

    .week-body { display: none; padding: 4px 18px 14px; }
    .week-section.open .week-body { display: block; }

    /* ── TASK ── */
    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 6px;
      border-radius: 6px;
      transition: background 0.12s;
      cursor: pointer;
    }
    .task-item:hover { background: var(--surface2); }
    .task-item input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin-top: 2px;
      flex-shrink: 0;
      accent-color: #6366f1;
      cursor: pointer;
    }
    .task-label {
      font-size: 0.88rem;
      line-height: 1.5;
      color: var(--text);
      transition: color 0.2s;
      cursor: pointer;
    }
    .task-item.done .task-label {
      text-decoration: line-through;
      color: var(--muted);
    }

    /* cert badge */
    .cert-card {
      background: linear-gradient(135deg, var(--surface2), var(--surface));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .cert-card .cert-icon { font-size: 1.6rem; }
    .cert-card .cert-info { font-size: 0.85rem; }
    .cert-card .cert-name { font-weight: 600; margin-bottom: 2px; }
    .cert-card .cert-meta { color: var(--muted); }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); padding: 10px 0; }
      .phase-tab { padding: 8px 14px; }
      .main { padding: 20px 16px; }
      .overall-pct { font-size: 0.9rem; }
    }
  </style>
</head>
<body>

<div class="header">

// ─────────────────────────────────────────────
//  STATE (localStorage)
// ─────────────────────────────────────────────
const STORAGE_KEY = 'devsecops-tracker-v1';

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}
function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState(); // { "p1-w0-t0": true, ... }

function taskKey(phaseIdx, weekIdx, taskIdx) {
  return `p${phaseIdx+1}-w${weekIdx}-t${taskIdx}`;
}

// ─────────────────────────────────────────────
//  STATS HELPERS
// ─────────────────────────────────────────────
function phaseStats(phaseIdx) {
  const phase = PHASES[phaseIdx];
  let total = 0, done = 0;
  phase.weeks.forEach((w, wi) => {
    w.tasks.forEach((_, ti) => {
      total++;
      if (state[taskKey(phaseIdx, wi, ti)]) done++;
    });
  });
  return { total, done, pct: total ? Math.round(done / total * 100) : 0 };
}

function overallStats() {
  let total = 0, done = 0;
  PHASES.forEach((_, pi) => {
    const s = phaseStats(pi);
    total += s.total; done += s.done;
  });
  return { total, done, pct: total ? Math.round(done / total * 100) : 0 };
}

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────
let activePhase = 0;

function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  const labelEl = sidebar.querySelector('.sidebar-label');
  sidebar.innerHTML = '';
  sidebar.appendChild(labelEl);

  PHASES.forEach((phase, pi) => {
    const s = phaseStats(pi);
    const tab = document.createElement('div');
    tab.className = 'phase-tab' + (pi === activePhase ? ' active' : '');
    tab.style.borderLeftColor = pi === activePhase ? phase.color : 'transparent';
    tab.innerHTML = `
      <span class="phase-dot" style="background:${phase.color}"></span>
      <span class="phase-tab-text">${phase.icon} ${phase.title.replace('Phase '+( pi+1)+': ','')}</span>
      <span class="phase-tab-pct">${s.pct}%</span>
    `;
    tab.onclick = () => switchPhase(pi);
    sidebar.appendChild(tab);
  });
}

function buildMain() {

  PHASES.forEach((phase, pi) => {
    const panel = document.createElement('div');
    panel.className = 'phase-panel' + (pi === activePhase ? ' active' : '');
    panel.id = 'panel-' + pi;

    const s = phaseStats(pi);

    panel.innerHTML = `

        </div>
        <span class="phase-badge${s.pct === 100 ? ' show' : ''}">✅ COMPLETE</span>
      </div>

      <div class="phase-progress">
        <div class="phase-progress-info">
          <div class="pct-label">Phase Progress</div>
          <div class="phase-pct-num" id="pct-num-${pi}">${s.pct}%</div>
        </div>
        <div class="phase-bar-track">
          <div class="phase-bar-fill" id="phase-fill-${pi}"
               style="width:${s.pct}%; background:${phase.color}"></div>
        </div>
      </div>

      ${phase.weeks.map((week, wi) => buildWeek(phase, pi, week, wi)).join('')}

      <div class="cert-card">
        <div class="cert-icon">${phase.cert.icon}</div>
        <div class="cert-info">
          <div class="cert-name">${phase.cert.name}</div>
          <div class="cert-meta">${phase.cert.meta}</div>
        </div>
      </div>
    `;

    main.appendChild(panel);
  });

  // reattach checkbox listeners
  document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
    cb.addEventListener('change', onCheck);
  });

  // open first week of active phase by default
  const firstWeek = document.querySelector('#panel-' + activePhase + ' .week-section');
  if (firstWeek) firstWeek.classList.add('open');
}

function buildWeek(phase, pi, week, wi) {
  const total = week.tasks.length;
  const done = week.tasks.filter((_, ti) => state[taskKey(pi, wi, ti)]).length;
  const pct = total ? Math.round(done / total * 100) : 0;

  const tasks = week.tasks.map((task, ti) => {
    const key = taskKey(pi, wi, ti);
    const checked = state[key] ? 'checked' : '';
    const doneClass = state[key] ? 'done' : '';
    return `
      <div class="task-item ${doneClass}" id="task-${key}">
        <input type="checkbox" id="cb-${key}" data-key="${key}" ${checked} />
        <label class="task-label" for="cb-${key}">${task}</label>
      </div>`;
  }).join('');

  return `
    <div class="week-section" id="week-${pi}-${wi}">
      <div class="week-header" onclick="toggleWeek(this)">
        <div class="week-header-left">
          <span class="week-label">${week.label}</span>
          <span class="week-tasks-count">${done}/${total} tasks</span>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <div class="week-mini-bar">
            <div class="week-mini-fill" style="width:${pct}%;background:${phase.color}"></div>
          </div>
          <span class="week-chevron">▼</span>
        </div>
      </div>
      <div class="week-body">${tasks}</div>
    </div>`;
}

function toggleWeek(header) {
  header.closest('.week-section').classList.toggle('open');
}

function onCheck(e) {
  const key = e.target.dataset.key;
  state[key] = e.target.checked;
  saveState(state);

  // update task item style
  const item = document.getElementById('task-' + key);
  if (item) item.classList.toggle('done', e.target.checked);

  // update week counts
  const parts = key.split('-'); // p1, w0, t2
  const pi = parseInt(parts[0].slice(1)) - 1;
  const wi = parseInt(parts[1].slice(1));
  const week = PHASES[pi].weeks[wi];
  const total = week.tasks.length;
  const done = week.tasks.filter((_, ti) => state[taskKey(pi, wi, ti)]).length;
  const pct = total ? Math.round(done / total * 100) : 0;

  const weekEl = document.getElementById(`week-${pi}-${wi}`);
  if (weekEl) {
    weekEl.querySelector('.week-tasks-count').textContent = `${done}/${total} tasks`;
    weekEl.querySelector('.week-mini-fill').style.width = pct + '%';
  }

  // update phase progress
  updatePhaseProgress(pi);
  updateOverall();
}

function updatePhaseProgress(pi) {
  const s = phaseStats(pi);
  const fillEl = document.getElementById('phase-fill-' + pi);
  const numEl  = document.getElementById('pct-num-' + pi);
  if (fillEl) fillEl.style.width = s.pct + '%';
  if (numEl)  numEl.textContent  = s.pct + '%';

  // badge
  const panel = document.getElementById('panel-' + pi);
  if (panel) {
    const badge = panel.querySelector('.phase-badge');
    if (badge) badge.classList.toggle('show', s.pct === 100);
  }

  // sidebar tab pct
  buildSidebar();
}

function updateOverall() {
  const s = overallStats();
  document.getElementById('overall-fill').style.width = s.pct + '%';
  document.getElementById('overall-pct').textContent  = s.pct + '%';
}

function switchPhase(pi) {
  activePhase = pi;
  document.querySelectorAll('.phase-tab').forEach((t, i) => {
    t.classList.toggle('active', i === pi);
    t.style.borderLeftColor = i === pi ? PHASES[i].color : 'transparent';
  });
  document.querySelectorAll('.phase-panel').forEach((p, i) => {
    p.classList.toggle('active', i === pi);
  });
  // open first week
  const firstWeek = document.querySelector('#panel-' + pi + ' .week-section');
  if (firstWeek && !firstWeek.classList.contains('open')) firstWeek.classList.add('open');
}

function resetAll() {
  if (!confirm('Reset ALL progress? This cannot be undone.')) return;
  state = {};
  saveState(state);
  init();
}

function init() {
  buildSidebar();
  buildMain();
  updateOverall();
}

init();
</script>
</body>
</html>
